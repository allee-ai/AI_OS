<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>AI OS Remote</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2a2a44;--accent:#6c63ff;--green:#4caf50;--yellow:#ffc107;--red:#ef5350;--text:#e0e0e0;--dim:#888}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
header h1{font-size:1.1em;font-weight:700}
header .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
header .dot.ok{background:var(--green)}
header .dot.err{background:var(--red)}

/* Tabs */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:49px;z-index:9;overflow-x:auto}
.tabs button{flex:1;min-width:0;background:none;border:none;border-bottom:3px solid transparent;color:var(--dim);font-size:.85em;font-weight:600;padding:10px 6px;cursor:pointer;white-space:nowrap}
.tabs button.active{color:#fff;border-bottom-color:var(--accent)}

/* Panels */
.panel{display:none;padding:16px}
.panel.active{display:block}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card h3{font-size:.9em;color:var(--dim);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}

/* Loop pills */
.loop-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.loop-row:last-child{border-bottom:none}
.loop-name{font-size:.9em;font-weight:600}
.loop-meta{font-size:.75em;color:var(--dim)}
.loop-next{font-size:.75em;color:var(--accent);font-variant-numeric:tabular-nums}
.pill{font-size:.7em;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase}
.pill.running{background:rgba(76,175,80,.15);color:var(--green)}
.pill.waiting{background:rgba(108,99,255,.15);color:var(--accent)}
.pill.paused{background:rgba(255,193,7,.15);color:var(--yellow)}
.pill.stopped{background:rgba(239,83,80,.15);color:var(--red)}
.loop-btn{background:none;border:1px solid var(--border);color:var(--text);font-size:.75em;padding:4px 10px;border-radius:8px;cursor:pointer}
.loop-btn:active{background:var(--accent);border-color:var(--accent)}

/* Tasks */
.task-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.task-row:last-child{border-bottom:none}
.task-goal{flex:1;font-size:.85em}
.task-status{font-size:.7em;font-weight:600;padding:2px 8px;border-radius:8px}
.task-status.completed{background:rgba(76,175,80,.15);color:var(--green)}
.task-status.pending{background:rgba(108,99,255,.15);color:var(--accent)}
.task-status.failed{background:rgba(239,83,80,.15);color:var(--red)}

/* Inputs */
.input-group{display:flex;gap:8px;margin-top:10px}
.input-group input,.input-group textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:.9em;font-family:inherit;resize:none}
.input-group textarea{min-height:60px}
.input-group input:focus,.input-group textarea:focus{outline:none;border-color:var(--accent)}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:.85em;font-weight:600;cursor:pointer;white-space:nowrap}
.btn:active{opacity:.8}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text)}

/* Chat */
.chat-messages{max-height:60vh;min-height:45vh;overflow-y:auto;margin-bottom:12px;padding:4px 2px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}
.chat-row{display:flex;flex-direction:column;margin-bottom:6px;animation:bubble .22s ease-out}
.chat-row.user{align-items:flex-end}
.chat-row.assistant{align-items:flex-start}
.chat-meta{font-size:.65em;color:var(--dim);padding:0 8px;margin-bottom:2px;letter-spacing:.02em;text-transform:lowercase}
.chat-bubble{max-width:86%;padding:10px 14px;border-radius:18px;font-size:.92em;line-height:1.45;word-wrap:break-word;overflow-wrap:anywhere;white-space:pre-wrap}
.chat-bubble.user{background:linear-gradient(135deg,var(--accent) 0%,#5a52e0 100%);color:#fff;border-bottom-right-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.chat-bubble.assistant{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:6px;color:var(--text)}
.chat-bubble.assistant.copilot{border-left:3px solid #4f9df7}
.chat-bubble.assistant.aios{border-left:3px solid #8b5cf6}
.chat-bubble code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.85em}
.chat-bubble pre{background:rgba(0,0,0,.35);padding:10px 12px;border-radius:8px;overflow-x:auto;margin:8px 0 0;font-size:.8em;line-height:1.35;max-width:100%}
.chat-bubble pre code{background:none;padding:0}
.chat-bubble a{color:#4f9df7;text-decoration:underline}
.chat-typing{color:var(--dim);font-size:.8em;font-style:italic;padding:6px 10px;display:flex;align-items:center;gap:8px}
.chat-typing::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes bubble{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:12px;font-size:.85em;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none}
.toast.show{opacity:1}

/* Refresh */
.refresh-btn{margin-left:auto;background:none;border:none;color:var(--dim);font-size:1.2em;cursor:pointer;padding:4px 8px}
.refresh-btn:active{color:var(--accent)}

/* Empty state */
.empty{color:var(--dim);font-size:.85em;text-align:center;padding:20px 0}
</style>
</head>
<body>

<header>
  <div class="dot" id="statusDot"></div>
  <h1>AI OS Remote</h1>
  <button class="refresh-btn" onclick="loadAll()" title="Refresh">&#x21bb;</button>
</header>

<div class="tabs" id="tabs">
  <button class="active" data-tab="status">Status</button>
  <button data-tab="chat">Chat</button>
  <button data-tab="loops">Loops</button>
  <button data-tab="goals">Goals</button>
  <button data-tab="tasks">Tasks</button>
  <button data-tab="notes">Notes</button>
</div>

<!-- ── Status Panel ── -->
<div class="panel active" id="p-status">
  <div class="card">
    <h3>Agent</h3>
    <div id="agentStatus" style="font-size:1.1em;font-weight:700">Loading…</div>
  </div>
  <div class="card">
    <h3>Loops <span id="loopSummary" style="float:right;font-size:.8em;font-weight:400"></span></h3>
    <div id="statusLoops"></div>
  </div>
  <div class="card">
    <h3>Recent Tasks</h3>
    <div id="statusTasks"></div>
  </div>
</div>

<!-- ── Chat Panel ── -->
<div class="panel" id="p-chat">
  <div class="card" style="padding:12px">
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
      <button class="btn" id="convoPickerBtn" style="flex:1;padding:6px 10px;font-size:.85em;background:var(--card);border:1px solid var(--border);color:var(--text);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" onclick="toggleConvoPicker()">
        <span id="convoCurrentLabel">no conversation</span>
      </button>
      <button class="btn" onclick="newConvo()" title="new chat" style="padding:6px 10px;font-size:.85em">+ new</button>
    </div>
    <div id="convoPicker" style="display:none;margin-bottom:10px;max-height:40vh;overflow-y:auto;background:var(--card);border:1px solid var(--border);border-radius:6px"></div>
    <div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
      <label style="color:var(--dim);font-size:.8em">agent</label>
      <select id="chatAgent" style="flex:1;padding:6px;background:var(--card);border:1px solid var(--border);color:var(--fg);border-radius:6px">
        <option value="aios">aios (local)</option>
        <option value="copilot">copilot (mirror this Mac's VS Code chat)</option>
      </select>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="empty">Send a message to start chatting</div>
    </div>
    <div class="input-group">
      <input type="text" id="chatInput" placeholder="Say something…" autocomplete="off"/>
      <button class="btn" id="chatSend" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<!-- ── Loops Panel ── -->
<div class="panel" id="p-loops">
  <div class="card">
    <h3>Background Loops</h3>
    <div id="loopsList"></div>
  </div>
</div>

<!-- ── Tasks Panel ── -->
<div class="panel" id="p-tasks">
  <div class="card">
    <h3>Add Task</h3>
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Task goal…"/>
      <button class="btn" onclick="addTask()">Add</button>
    </div>
  </div>
  <div class="card">
    <h3>Tasks</h3>
    <div id="tasksList"></div>
  </div>
</div>

<!-- ── Goals Panel ── -->
<div class="panel" id="p-goals">
  <div class="card">
    <h3>New Goal</h3>
    <div class="input-group" style="flex-direction:column;gap:8px">
      <input type="text" id="goalInput" placeholder="What do you want aios to do?"/>
      <textarea id="goalRationale" placeholder="Why / context (optional)" rows="2"></textarea>
      <div class="input-group" style="gap:8px">
        <select id="goalPriority" style="flex:1;padding:8px;background:var(--bg);color:#fff;border:1px solid var(--border);border-radius:6px">
          <option value="urgent">urgent</option>
          <option value="high">high</option>
          <option value="medium" selected>medium</option>
          <option value="low">low</option>
        </select>
        <input type="number" id="goalUrgency" min="0" max="100" placeholder="urgency 0-100" style="flex:1"/>
      </div>
      <button id="goalSubmitBtn" class="btn" onclick="addGoal()" style="align-self:flex-end">Add Goal (pushes to Copilot)</button>
    </div>
  </div>
  <div class="card">
    <h3>Pending</h3>
    <div id="goalsList"></div>
  </div>
</div>

<!-- ── Notes Panel ── -->
<div class="panel" id="p-notes">
  <div class="card">
    <h3>Quick Note</h3>
    <div class="input-group" style="flex-direction:column">
      <textarea id="noteInput" placeholder="Write a note…" rows="3"></textarea>
      <button class="btn" onclick="addNote()" style="align-self:flex-end">Save Note</button>
    </div>
  </div>
  <div class="card">
    <h3>Notes</h3>
    <div id="notesList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = window.location.origin;
const API = BASE + '/api/mobile';
const SUB = BASE + '/api/subconscious';

// ── Auth: accept ?key= from bookmark, persist, attach Bearer to all fetches ──
(function initAuth() {
  try {
    const params = new URLSearchParams(window.location.search);
    const key = params.get('key');
    if (key) {
      localStorage.setItem('aios_api_token', key.trim());
      params.delete('key');
      const qs = params.toString();
      const clean = window.location.pathname + (qs ? '?' + qs : '') + window.location.hash;
      window.history.replaceState({}, '', clean);
    }
  } catch (e) { /* non-fatal */ }
  const tok = localStorage.getItem('aios_api_token');
  if (!tok) {
    // No token — block page and show a minimal prompt so the user can
    // paste one manually if the bookmark flow failed.
    window.addEventListener('DOMContentLoaded', () => {
      const body = document.body;
      body.innerHTML = '<div style="max-width:420px;margin:60px auto;padding:24px;background:#1a1a1a;border:1px solid #333;border-radius:10px;font-family:system-ui;color:#eee">' +
        '<h2 style="margin:0 0 12px">aios · mobile</h2>' +
        '<p style="color:#aaa;font-size:.9em;margin:0 0 14px">paste AIOS_API_TOKEN</p>' +
        '<input id="_tok" type="password" style="width:100%;padding:10px;border:1px solid #444;background:#111;color:#fff;border-radius:6px;font-size:14px" placeholder="token…"/>' +
        '<button id="_submit" style="width:100%;margin-top:10px;padding:10px;background:#4f9df7;color:#fff;border:none;border-radius:6px;font-weight:600">login</button>' +
        '</div>';
      document.getElementById('_submit').onclick = () => {
        const v = document.getElementById('_tok').value.trim();
        if (v) { localStorage.setItem('aios_api_token', v); window.location.reload(); }
      };
    });
    return;
  }
  const nativeFetch = window.fetch.bind(window);
  window.fetch = (input, init) => {
    const headers = new Headers((init && init.headers) || {});
    if (!headers.has('Authorization')) headers.set('Authorization', 'Bearer ' + tok);
    return nativeFetch(input, Object.assign({}, init || {}, { headers }));
  };
})();

// ── Tabs ──
document.getElementById('tabs').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  const tab = e.target.dataset.tab;
  document.getElementById('p-' + tab).classList.add('active');
  // Lazy-refresh the panel being opened so data is fresh.
  if (tab === 'goals' && typeof loadGoals === 'function') loadGoals();
  if (tab === 'tasks' && typeof loadTasks === 'function') loadTasks();
  if (tab === 'notes' && typeof loadNotes === 'function') loadNotes();
  if (tab === 'loops' && typeof loadLoops === 'function') loadLoops();
  if (tab === 'chat' && typeof initChatTab === 'function') initChatTab();
});

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── API helper ──
async function api(path, opts) {
  try {
    const r = await fetch(path, opts);
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      throw new Error(e.detail || r.statusText);
    }
    return await r.json();
  } catch (err) {
    toast('Error: ' + err.message);
    throw err;
  }
}

// ── Status ──
async function loadStatus() {
  try {
    const d = await api(API + '/status');
    const dot = document.getElementById('statusDot');
    dot.className = 'dot ' + (d.agent === 'ready' ? 'ok' : 'err');
    document.getElementById('agentStatus').textContent =
      d.agent === 'ready' ? '● Ready' : '○ ' + d.agent;

    const active = d.loops.filter(l => l.status !== 'paused' && l.status !== 'stopped').length;
    document.getElementById('loopSummary').textContent =
      active + '/' + d.loops.length + ' active';

    document.getElementById('statusLoops').innerHTML = d.loops.map(l => {
      const ds = loopDisplay(l);
      return '<div class="loop-row">' +
        '<div><span class="loop-name">' + esc(l.name) + '</span>' +
        ' <span class="pill ' + ds.cls + '">' + ds.label + '</span></div>' +
        '<div style="text-align:right"><span class="loop-meta">' + l.runs + ' runs' +
          (l.avg_duration != null ? ' · avg ' + fmtTime(l.avg_duration) : '') + '</span>' +
        '<br><span class="loop-next" data-interval="' + (l.interval||0) + '" data-lastrun="' + (l.last_run||'') + '" data-status="' + l.status + '" data-delay="' + (l.initial_delay||0) + '" data-busy="' + (l.is_busy?1:0) + '"></span></div>' +
      '</div>';
    }).join('');
    updateCountdowns();

    document.getElementById('statusTasks').innerHTML = d.tasks.length
      ? d.tasks.map(t =>
          '<div class="task-row">' +
            '<span class="task-goal">' + esc(t.goal) + '</span>' +
            '<span class="task-status ' + t.status + '">' + t.status + '</span>' +
          '</div>'
        ).join('')
      : '<div class="empty">No recent tasks</div>';
  } catch(e) {
    document.getElementById('statusDot').className = 'dot err';
    document.getElementById('agentStatus').textContent = 'Offline';
  }
}

// ── Loops ──
async function loadLoops() {
  const d = await api(API + '/loops');
  document.getElementById('loopsList').innerHTML = d.loops.map(l => {
    const ds = loopDisplay(l);
    const isPaused = l.status === 'paused';
    const durInfo = l.avg_duration != null
      ? '<br><span class="loop-meta">last ' + fmtTime(l.last_duration) + ' · avg ' + fmtTime(l.avg_duration) + '</span>'
      : '';
    return '<div class="loop-row">' +
      '<div>' +
        '<span class="loop-name">' + esc(l.name) + '</span> ' +
        '<span class="pill ' + ds.cls + '">' + ds.label + '</span>' +
        '<br><span class="loop-meta">' + l.runs + ' runs · ' + l.errors + ' errors</span>' +
        durInfo +
        '<br><span class="loop-next" data-interval="' + (l.interval||0) + '" data-lastrun="' + (l.last_run||'') + '" data-status="' + l.status + '"></span>' +
      '</div>' +
      '<button class="loop-btn" onclick="toggleLoop(\'' + esc(l.name) + '\',\'' +
        (isPaused ? 'resume' : 'pause') + '\')">' +
        (isPaused ? '▶ Resume' : '⏸ Pause') +
      '</button>' +
    '</div>';
  }).join('');
  updateCountdowns();
}

async function toggleLoop(name, action) {
  await api(API + '/loops/' + encodeURIComponent(name), {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({action})
  });
  toast(name + ' ' + action + 'd');
  loadLoops();
  loadStatus();
}

// ── Chat ──
const chatMsgs = [];
let currentSessionId = localStorage.getItem('aios_mobile_session_id') || null;
let currentSessionName = localStorage.getItem('aios_mobile_session_name') || '';

function setCurrentSession(sid, name) {
  currentSessionId = sid || null;
  currentSessionName = name || '';
  if (sid) {
    localStorage.setItem('aios_mobile_session_id', sid);
    localStorage.setItem('aios_mobile_session_name', name || '');
  } else {
    localStorage.removeItem('aios_mobile_session_id');
    localStorage.removeItem('aios_mobile_session_name');
  }
  const label = document.getElementById('convoCurrentLabel');
  if (label) label.textContent = name || (sid ? sid.substring(0,18)+'…' : 'new conversation');
}

function toggleConvoPicker() {
  const el = document.getElementById('convoPicker');
  if (el.style.display === 'none') {
    loadConvoList();
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

async function loadConvoList() {
  const el = document.getElementById('convoPicker');
  el.innerHTML = '<div class="empty" style="padding:10px">loading…</div>';
  try {
    const r = await fetch(BASE + '/api/conversations?limit=30');
    if (!r.ok) throw new Error(r.statusText);
    const data = await r.json();
    const convos = Array.isArray(data) ? data : (data.conversations || []);
    if (!convos.length) {
      el.innerHTML = '<div class="empty" style="padding:10px">no conversations yet</div>';
      return;
    }
    el.innerHTML = convos.map(c => {
      const sid = c.session_id || c.id || '';
      const name = c.name || c.title || sid.substring(0,24);
      const ts = c.updated_at || c.last_turn_at || c.created_at || '';
      const when = ts ? new Date(ts).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
      const src = c.source ? '<span style="color:var(--dim);font-size:.75em"> · '+esc(c.source)+'</span>' : '';
      const isActive = sid === currentSessionId;
      return '<div onclick="selectConvo(\''+encodeURIComponent(sid)+'\', \''+encodeURIComponent(name)+'\')" ' +
        'style="padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;'+(isActive?'background:rgba(79,157,247,0.08)':'')+'">' +
        '<div style="font-weight:'+(isActive?'700':'500')+';font-size:.9em">' + esc(name) + src + '</div>' +
        '<div style="color:var(--dim);font-size:.75em;margin-top:2px">' + esc(when) + '</div>' +
        '</div>';
    }).join('');
  } catch (e) {
    el.innerHTML = '<div class="empty" style="padding:10px">error: '+esc(e.message)+'</div>';
  }
}

async function selectConvo(sidEnc, nameEnc) {
  const sid = decodeURIComponent(sidEnc);
  const name = decodeURIComponent(nameEnc);
  setCurrentSession(sid, name);
  document.getElementById('convoPicker').style.display = 'none';
  await loadConvoHistory(sid);
}

async function loadConvoHistory(sid) {
  chatMsgs.length = 0;
  if (!sid) { renderChat(); return; }
  try {
    const r = await fetch(BASE + '/api/conversations/' + encodeURIComponent(sid) + '?limit=200');
    if (!r.ok) throw new Error(r.statusText);
    const data = await r.json();
    const turns = data.turns || [];
    for (const t of turns) {
      const ts = t.timestamp ? new Date(t.timestamp).getTime() : Date.now();
      if (t.user) chatMsgs.push({role:'user', text:t.user, ts});
      if (t.assistant) chatMsgs.push({role:'assistant', text:t.assistant, ts, agent:'aios'});
    }
  } catch (e) {
    chatMsgs.push({role:'assistant', text:'(failed to load history: '+e.message+')', ts:Date.now(), agent:'aios'});
  }
  renderChat();
}

async function newConvo() {
  setCurrentSession(null, '');
  chatMsgs.length = 0;
  renderChat();
  // Ask backend to spin a fresh session so the next message doesn't
  // accidentally land in whatever session the singleton was holding.
  try {
    const r = await fetch(BASE + '/api/chat/start-session', {method:'POST'});
    if (r.ok) {
      const d = await r.json();
      if (d.session_id) setCurrentSession(d.session_id, 'new chat');
    }
  } catch (e) { /* best-effort */ }
  toast('new conversation');
}

// Minimal safe markdown: escape everything, then re-enable a small set
// of patterns. No HTML from the reply ever reaches the DOM raw.
function renderMarkdown(raw) {
  let s = esc(raw || '');
  // fenced code blocks ```...```
  s = s.replace(/```([\w-]*)\n([\s\S]*?)```/g, (_, lang, body) =>
    '<pre><code>' + body.replace(/\n$/, '') + '</code></pre>');
  // inline code `...`
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // bold **...**
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  // italic *...*  (careful: after bold)
  s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
  // links [text](url) — only http(s)
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}

function fmtTime(ts) {
  const d = ts ? new Date(ts) : new Date();
  const h = String(d.getHours()).padStart(2,'0');
  const m = String(d.getMinutes()).padStart(2,'0');
  return h + ':' + m;
}

function renderChat() {
  const el = document.getElementById('chatMessages');
  if (!chatMsgs.length) {
    el.innerHTML = '<div class="empty">Send a message to start chatting</div>';
    return;
  }
  el.innerHTML = chatMsgs.map(m => {
    const meta = m.role === 'user'
      ? 'you · ' + fmtTime(m.ts)
      : (m.agent || 'aios') + ' · ' + fmtTime(m.ts);
    const bubbleCls = 'chat-bubble ' + m.role +
      (m.role === 'assistant' ? ' ' + (m.agent || 'aios') : '');
    const body = m.role === 'assistant' ? renderMarkdown(m.text) : esc(m.text);
    return '<div class="chat-row ' + m.role + '">' +
             '<div class="chat-meta">' + esc(meta) + '</div>' +
             '<div class="' + bubbleCls + '">' + body + '</div>' +
           '</div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const agent = (document.getElementById('chatAgent')||{}).value || 'aios';
  chatMsgs.push({role: 'user', text, ts: Date.now(), agent});
  renderChat();

  const btn = document.getElementById('chatSend');
  btn.disabled = true;
  btn.textContent = '…';

  const msgEl = document.getElementById('chatMessages');
  const typingLabel = agent === 'copilot' ? 'waiting on Copilot…' : 'thinking…';
  msgEl.insertAdjacentHTML('beforeend',
    '<div class="chat-typing" id="chatTyping">' + typingLabel + '</div>');
  msgEl.scrollTop = msgEl.scrollHeight;

  try {
    const d = await api(API + '/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({text, agent, session_id: currentSessionId})
    });
    chatMsgs.push({role: 'assistant', text: d.reply, ts: Date.now(), agent: d.agent || agent});
    // Adopt whatever session_id the backend ended up using (first
    // message in a brand-new chat gets its sid back from the server).
    if (d.session_id && d.session_id !== currentSessionId) {
      setCurrentSession(d.session_id, currentSessionName || '');
    }
  } catch(e) {
    chatMsgs.push({role: 'assistant', text: '(error: ' + e.message + ')', ts: Date.now(), agent});
  }
  const t = document.getElementById('chatTyping'); if (t) t.remove();
  btn.disabled = false;
  btn.textContent = 'Send';
  renderChat();
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// Hydrate the chat tab the first time it's opened (and on initial load
// if that's the saved session). Reloads turns from whichever conversation
// we left off in so the phone feels continuous.
let _chatHydrated = false;
async function initChatTab() {
  if (!_chatHydrated) {
    _chatHydrated = true;
    setCurrentSession(currentSessionId, currentSessionName);
    if (currentSessionId) await loadConvoHistory(currentSessionId);
  }
}

// ── Goals ──
async function loadGoals() {
  try {
    const goals = await api(SUB + '/goals?status=pending&limit=10');
    document.getElementById('goalsList').innerHTML = goals.length
      ? goals.map(g =>
          '<div class="task-row">' +
            '<span class="task-goal">#' + g.id + ' ' + esc(g.goal) + '</span>' +
            '<span class="task-status">' + esc(g.priority || '') +
              (g.urgency != null ? ' u' + g.urgency : '') + '</span>' +
          '</div>'
        ).join('')
      : '<div class="empty">No pending goals</div>';
  } catch(e) { /* swallow — toast already fired */ }
}

async function addGoal() {
  const input = document.getElementById('goalInput');
  const rat = document.getElementById('goalRationale');
  const pri = document.getElementById('goalPriority');
  const urg = document.getElementById('goalUrgency');
  const btn = document.getElementById('goalSubmitBtn');
  const list = document.getElementById('goalsList');
  const goal = input.value.trim();
  if (!goal) return;
  // In-flight guard: prevent the user from mashing the button while the
  // request is in flight. Goal #20 (mobile): without this it was easy to
  // submit 19 duplicates before the first round-trip returned.
  if (btn.dataset.busy === '1') return;
  btn.dataset.busy = '1';
  btn.disabled = true;
  const origLabel = btn.textContent;
  btn.textContent = 'Adding\u2026';
  // Optimistic row at top of pending list so it's obvious the goal
  // landed locally even before the server confirms.
  const tempId = 'goal-pending-' + Date.now();
  const optimistic =
    '<div id="' + tempId + '" class="task-row" style="opacity:.7">' +
      '<span class="task-goal"><em>adding\u2026</em> ' + esc(goal) + '</span>' +
      '<span class="task-status">' + esc(pri.value) +
        (urg.value !== '' ? ' u' + esc(urg.value) : '') + '</span>' +
    '</div>';
  if (list.querySelector('.empty')) {
    list.innerHTML = optimistic;
  } else {
    list.insertAdjacentHTML('afterbegin', optimistic);
  }
  const body = { goal, rationale: rat.value.trim(), priority: pri.value };
  if (urg.value !== '' && !isNaN(Number(urg.value))) body.urgency = Number(urg.value);
  try {
    const res = await api(API + '/goal', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    input.value = ''; rat.value = ''; urg.value = '';
    toast('Goal #' + res.id + ' added \u2014 pushed to Copilot');
    loadGoals();  // Replaces the optimistic row with the real list.
  } catch (e) {
    // api() already showed a toast. Roll back the optimistic row so
    // the user knows it didn't land.
    const tmp = document.getElementById(tempId);
    if (tmp) tmp.remove();
    if (!list.children.length) {
      list.innerHTML = '<div class="empty">No pending goals</div>';
    }
  } finally {
    btn.dataset.busy = '0';
    btn.disabled = false;
    btn.textContent = origLabel;
  }
}

document.getElementById('goalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); addGoal(); }
});

// ── Escape HTML ──
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Countdown timers ──
let _serverStartApprox = Date.now(); // fallback if no last_run

function fmtTime(sec) {
  if (sec <= 0) return 'now';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m > 0 ? m + 'm ' + String(s).padStart(2,'0') + 's' : s + 's';
}

function loopDisplay(l) {
  if (l.status === 'paused') return {label: 'paused', cls: 'paused'};
  if (l.status === 'stopped') return {label: 'stopped', cls: 'stopped'};
  if (l.status === 'error') return {label: 'error', cls: 'stopped'};
  return l.is_busy ? {label: 'running', cls: 'running'} : {label: 'waiting', cls: 'waiting'};
}

function updateCountdowns() {
  document.querySelectorAll('.loop-next').forEach(el => {
    const interval = parseFloat(el.dataset.interval);
    const lastRun = el.dataset.lastrun;
    const status = el.dataset.status;
    const delay = parseFloat(el.dataset.delay) || 0;
    const busy = el.dataset.busy === '1';

    if (!interval || status === 'paused') {
      el.textContent = status === 'paused' ? 'paused' : '';
      return;
    }

    // Currently executing — no countdown needed
    if (busy) {
      el.textContent = 'running now';
      return;
    }

    let nextRun;
    if (lastRun) {
      // Has run before — next fire = last_run + interval
      nextRun = new Date(lastRun).getTime() + interval * 1000;
    } else {
      // Never ran yet — first fire = server start + initial_delay
      nextRun = _serverStartApprox + delay * 1000;
    }

    const remaining = Math.max(0, (nextRun - Date.now()) / 1000);
    el.textContent = remaining <= 0 ? 'due' : 'next: ' + fmtTime(remaining);
  });
}

// Tick every second
setInterval(updateCountdowns, 1000);

// ── Init ──
function loadAll() {
  loadStatus();
  loadLoops();
  loadTasks();
  loadGoals();
  loadNotes();
}
loadAll();

// Auto-refresh status every 30s
setInterval(loadStatus, 30000);
