# Pricing page structure for vre-construction.com
# Edit prose, callouts, and section ordering here. Tables live in pricing/*.csv.
# After editing, run: .venv/bin/python infra/build_vre.py

meta:
  title: "Pricing — Vanguard Reconstruction"
  description: "The most comprehensive public electrician pricing guide in Cincinnati. Honest ranges for outlets, switches, lighting, panels, service upgrades, EV chargers, rewires, generators, and remodels. Updated 2026."
  canonical: "https://vre-construction.com/pricing.html"
  og_title: "Pricing — Vanguard Reconstruction"
  og_description: "A working price guide for Cincinnati residential electrical: outlets, panels, EV chargers, rewires, and everything in between. Real ranges, not bait numbers."

