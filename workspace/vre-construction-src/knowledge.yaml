  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "about": { "@id": "https://vre-construction.com/#business" },
    "mainEntity": [
      { "@type": "Question", "name": "What size electrical panel do I need?",
        "acceptedAnswer": { "@type": "Answer", "text": "For most single-family homes in Cincinnati, 200-amp service is the modern standard. 100-amp is fine for a small all-gas home with no central AC and no EV. Add an EV charger, a heat pump, or an induction range and you usually want 200-amp." } },
      { "@type": "Question", "name": "Why does my breaker keep tripping?",
        "acceptedAnswer": { "@type": "Answer", "text": "Three reasons in order of likelihood: too much load on the circuit, a failing device on the circuit, or a worn-out breaker. AFCI/GFCI breakers also trip on things a regular breaker would ignore." } },
      { "@type": "Question", "name": "Is knob-and-tube wiring dangerous?",
        "acceptedAnswer": { "@type": "Answer", "text": "Knob-and-tube installed correctly and left alone is not inherently dangerous. The problems are insulation packed against it, no ground conductor, brittle cloth insulation, and insurance refusing to write policies on homes with active K&T." } },
      { "@type": "Question", "name": "Can I install an EV charger on my existing panel?",
        "acceptedAnswer": { "@type": "Answer", "text": "Sometimes. A Level 2 home charger is typically a 40-60 amp 240V circuit. If your panel has a free 2-pole slot and the main service has headroom, you can add the circuit. If the panel is full or undersized, you need an upgrade or a load-management device." } }
