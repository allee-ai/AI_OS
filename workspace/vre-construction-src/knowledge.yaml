meta:
  title: "Knowledge — Vanguard Reconstruction"
  description: "Plain-English answers to Cincinnati electrical questions: panel sizing, EV chargers, knob-and-tube, breaker trips, what photos help us quote, and the questions worth asking before you hire anyone."

