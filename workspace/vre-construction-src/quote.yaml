meta:
  title: "Instant quote — Vanguard Reconstruction"
  description: "Build a real, itemized electrical estimate in three minutes. Same prices we publish on our pricing page. We send the PDF to your inbox."

hero:
  eyebrow: "Instant quote"
  h1_before: "Build a real bid in"
  h1_accent: "three minutes."
  lede: "We publish our prices. So we wired them into a calculator. Click what you need, see the range live, get the PDF in your inbox. No salesperson. No callback wait."
  micro: "This produces a written estimate, not a final invoice. We confirm everything on a 15-minute walkthrough before any work starts."

# ---------- step 1: who are you / what is this for ----------
property_types:
  - id: home
    label: "My home"
    desc: "I live here. No rush, real walkthrough, explain everything."
    icon: "🏠"
  - id: rental
    label: "A rental I own"
    desc: "Tenants in or moving in soon. Bid first, schedule second."
    icon: "🔑"
  - id: flip
    label: "Flip in progress"
    desc: "On the clock. Want a draw schedule and a firm date."
    icon: "🔨"
  - id: walkthrough
    label: "Pre-purchase walkthrough"
    desc: "Under contract or considering. Want to know what you're buying before close."
    icon: "🔍"

# ---------- step 2/3: line-item catalog ----------
# Each category lights up a section of checkboxes + quantity counters.
# `low` and `high` are USD. `unit` is "each" (default) or "fixed".
# Items with a `tier_note` get a small-print clarifier under the label.
categories:
  - id: outlets_switches
    label: "Outlets & switches"
    icon: "🔌"
    items:
      - id: outlet_replace
        label: "Replace standard outlet"
        low: 115
        high: 185
        tier_note: "5+ at one visit drops to $95 ea. 10+: $85 ea. We adjust the bid automatically."
      - id: outlet_gfci
        label: "Replace / install GFCI outlet"
        low: 145
        high: 215
      - id: outlet_add_accessible
        label: "Add new outlet (basement / accessible)"
        low: 175
        high: 295
      - id: outlet_add_finished
        label: "Add new outlet (finished wall, fish from below)"
        low: 275
        high: 475
      - id: outlet_2to3
        label: "2-prong → 3-prong (with real ground)"
        low: 185
        high: 285
      - id: outlet_ext
        label: "Exterior weatherproof outlet"
        low: 285
        high: 475
      - id: switch_replace
        label: "Replace standard switch"
        low: 95
        high: 165
