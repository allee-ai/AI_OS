# ---------- step 4: what changes the number ----------
modifiers:
  - id: plaster
    label: "Plaster & lath walls (pre-1940 home)"
    pct: 25
    desc: "Slower, more careful work. Adds about 25% to wall-cut items."
  - id: panel_full
    label: "Existing panel is more than 80% full"
    pct: 15
    desc: "Adds may need a panel-feed analysis or load-management device first."
  - id: long_run
    label: "Most runs are 25+ ft from the panel"
    pct: 20
    desc: "Adds about 20% on circuit / EV runs."
  - id: knob_tube
    label: "Knob & tube still in the walls"
    pct: 0
    desc: "We'll add a K&T conversation to the walkthrough — see Knowledge for the strategy."
  - id: insurance
    label: "Insurance is requiring this work"
    pct: 0
    desc: "We write the bid in the language insurers and underwriters expect."
  - id: occupied
    label: "Tenants occupying during the work"
    pct: 10
    desc: "Lower-impact scheduling, more cleanup. About +10%."

# ---------- step 5: contact + segmentation ----------
contact:
  h2: "Where do we send the estimate?"
  lede: "PDF goes to your inbox in about a minute. We text the morning of the walkthrough — and again when we're parked out front."
  privacy: "We don't share your info. Ever. No mailing list. No sales calls."
  fields:
    - { name: "name", label: "Your name", type: "text", required: true }
    - { name: "email", label: "Email", type: "email", required: true }
    - { name: "phone", label: "Phone (we'll text)", type: "tel", required: true }
    - { name: "address", label: "Property address (so we can route the right crew)", type: "text", required: false }
    - { name: "notes", label: "Anything else we should know? Photos? Deadlines?", type: "textarea", required: false }

# ---------- result page CTAs ----------
result:
  cta_primary:
    label: "Email me the PDF estimate"
  cta_secondary:
    label: "Text me to book the walkthrough"
  followup_micro: "If your scope shifts on the walkthrough — and it usually does — the bid moves with it. Walkthrough is free."

outro_cta_h2: "Want a human in the loop sooner?"
outro_cta_lede: "Skip the calculator and just text us a couple of photos. Same answer, less clicking."
